name: Autofix

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  autofix:
    runs-on: ubuntu-latest
    # Only run on PRs from the same repo (not forks)
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v7
        with:
          # Check out the PR's HEAD commit (safe because we validate the repo above)
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv pip install --system pre-commit

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-hooks-${{ hashFiles('.pre-commit-config.yml') }}-v01

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Commit and push changes
        if: failure()
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "github-actions"
          git add --update
          git commit -m "🎨 Autofix from pre-commit hooks" || echo "No changes to commit"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
